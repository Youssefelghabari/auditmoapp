name: commercial_audit
description: Application d'audit de conformité commerciale
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Stockage local
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3

  # Caméra & images
  image_picker: ^1.1.2
  camera: ^0.10.5+9

  # GPS
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # UI
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  percent_indicator: ^4.2.4
  flutter_slidable: ^3.1.1
  share_plus: ^9.0.0
  pdf: ^3.11.0
  printing: ^5.12.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
